services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: manolo
      POSTGRES_USER: manolo
      POSTGRES_PASSWORD: manolo
    volumes:
      - pgdata:/var/lib/postgresql/data # Persiste os dados do banco
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    ports:
      - "8888:8080"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    volumes:
      - ./:/app # Mapeia a pasta do código-fonte para dentro do contêiner
    env_file: .env
    ports:
      - "8000:8000"
    command: uvicorn channels.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: